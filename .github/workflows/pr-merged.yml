name: PR Merged Automation

on:
  pull_request:
    types:
      - closed

permissions:
  contents: read
  pull-requests: write

jobs:
  thank-contributor:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest

    steps:
      - name: Thank contributor
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request.number,
              body: `🎉 Thank you @${context.payload.pull_request.user.login} for your contribution!

              Your pull request has been successfully **merged** into the project. 🚀

              We truly appreciate the time and effort you invested in improving **Pollution Control Hub**.

              We look forward to seeing more of your amazing contributions in the future! 💙`
            });
